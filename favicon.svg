<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Vibrant gradient for a modern tech feel -->
    <linearGradient id="pmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0062FF" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>
    <!-- Smooth drop shadow for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Canvas (Optional but ensures high contrast in all browser themes) -->
  <rect width="32" height="32" rx="7" fill="#111827" />

  <!-- Project Management Icon Graph/Check Hybrid -->
  <g filter="url(#dropShadow)">
    <!-- Bottom/Left Progress Bar (Background layer) -->
    <rect x="6" y="18" width="8" height="4" rx="2" fill="#374151" />
    
    <!-- Top Progress Bar -->
    <rect x="6" y="10" width="12" height="4" rx="2" fill="url(#pmGradient)" opacity="0.4" />
    
    <!-- Dynamic Checkmark / Growth Arrow Layer -->
    <path d="M11 16L15 20L26 9" 
          stroke="url(#pmGradient)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" />
  </g>
</svg>
