<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stratega PM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --glass-bg: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.35);
    --ink: #1c2430;
    --ink-soft: #566072;
    --accent: #3d6cff;
    --accent-soft: #7c9bff;
    --bg-1: #eef2fb;
    --bg-2: #f6f2ea;
    --danger: #d9534f;
    --ok: #2fa86b;
    --warn: #e2a53a;
    --radius: 16px;
    --shadow: 0 8px 30px rgba(30,40,80,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    color: var(--ink); min-height:100vh;
  }
  .glass{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  #login-screen{
    display:flex; align-items:center; justify-content:center; height:100vh;
  }
  #login-screen .card{ width:320px; padding:32px; text-align:center; }
  #login-screen h1{ font-size:22px; margin:0 0 4px; }
  #login-screen p{ color:var(--ink-soft); font-size:13px; margin:0 0 20px; }
  #login-screen input{
    width:100%; padding:12px 14px; margin-bottom:12px; border-radius:10px;
    border:1px solid rgba(0,0,0,0.1); font-size:16px; letter-spacing:2px; text-align:center;
  }
  #login-screen select{ width:100%; padding:10px; margin-bottom:12px; border-radius:10px; border:1px solid rgba(0,0,0,0.1); }
  button.primary{
    background: var(--accent); color:#fff; border:none; padding:12px 18px;
    border-radius:10px; font-weight:600; cursor:pointer; width:100%;
  }
  button.primary:hover{ background: var(--accent-soft); }
  #login-error{ color:var(--danger); font-size:13px; min-height:18px; margin-top:6px; }

  #app{ display:none; }
  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px; margin:16px; padding-right:24px;
  }
  header.topbar .brand{ font-size:18px; font-weight:700; }
  header.topbar .brand span{ color: var(--accent); }
  nav.tabs{ display:flex; gap:6px; flex-wrap:wrap; }
  nav.tabs button{
    background:transparent; border:none; padding:8px 14px; border-radius:10px;
    cursor:pointer; font-size:13px; color:var(--ink-soft); font-weight:600;
  }
  nav.tabs button.active{ background: var(--accent); color:#fff; }
  .who{ font-size:13px; color:var(--ink-soft); display:flex; align-items:center; gap:10px; }
  .who button{ background:none; border:1px solid rgba(0,0,0,0.15); border-radius:8px; padding:6px 10px; cursor:pointer; }

  main{ margin: 0 16px 24px; }
  .view{ display:none; }
  .view.active{ display:block; }

  /* Kanban */
  .kanban{ display:grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap:14px; }
  .kanban-col{ padding:14px; min-height:200px; }
  .kanban-col h3{ margin:0 0 10px; font-size:14px; display:flex; justify-content:space-between; }
  .kanban-col h3 .count{ background:rgba(0,0,0,0.06); border-radius:20px; padding:1px 8px; font-size:12px; }
  .task-card{
    background:#fff; border-radius:12px; padding:10px 12px; margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06); cursor:grab; border-left:4px solid var(--accent);
  }
  .task-card.priority-High{ border-left-color: var(--danger); }
  .task-card.priority-Medium{ border-left-color: var(--warn); }
  .task-card.priority-Low{ border-left-color: var(--ok); }
  .task-card h4{ margin:0 0 4px; font-size:13.5px; }
  .task-card .meta{ font-size:11px; color:var(--ink-soft); display:flex; justify-content:space-between; }
  .task-card .comment-count{ font-size:11px; color:var(--accent); margin-top:6px; }
  .kanban-col.dragover{ outline:2px dashed var(--accent); }

  /* Modal */
  .modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(20,25,40,0.35);
    align-items:center; justify-content:center; z-index:50;
  }
  .modal-backdrop.active{ display:flex; }
  .modal{ width:480px; max-height:86vh; overflow:auto; padding:24px; }
  .modal h2{ margin-top:0; font-size:17px; }
  .modal label{ font-size:12px; color:var(--ink-soft); display:block; margin:10px 0 4px; }
  .modal input, .modal select, .modal textarea{
    width:100%; padding:9px 10px; border-radius:8px; border:1px solid rgba(0,0,0,0.12); font-size:13px;
  }
  .modal textarea{ min-height:60px; resize:vertical; }
  .modal .row2{ display:flex; gap:10px; }
  .modal .row2 > div{ flex:1; }
  .modal-actions{ display:flex; justify-content:space-between; margin-top:18px; gap:10px; }
  .modal-actions button{ padding:9px 16px; border-radius:8px; border:none; cursor:pointer; font-weight:600; }
  .btn-save{ background:var(--accent); color:#fff; }
  .btn-cancel{ background:rgba(0,0,0,0.06); }
  .btn-delete{ background:var(--danger); color:#fff; }

  .comments-box{ margin-top:14px; border-top:1px solid rgba(0,0,0,0.08); padding-top:10px; }
  .comment{ font-size:12px; padding:6px 0; border-bottom:1px dashed rgba(0,0,0,0.06); }
  .comment b{ color:var(--accent); }
  #comment-input{ margin-top:8px; }

  /* Gantt */
  .gantt-wrap{ padding:18px; overflow-x:auto; }
  .gantt-row{ display:flex; align-items:center; margin-bottom:10px; font-size:12px; }
  .gantt-label{ width:180px; flex-shrink:0; padding-right:10px; }
  .gantt-track{ position:relative; flex:1; height:38px; background:rgba(0,0,0,0.04); border-radius:6px; min-width:400px; }
  .bar{ position:absolute; height:10px; border-radius:5px; top:0; }
  .bar.planned{ background: var(--accent-soft); top:2px; }
  .bar.actual{ background: var(--ok); top:14px; }
  .bar.baseline1{ background:#b39ddb; top:26px; height:6px; opacity:0.8; }
  .bar.baseline2{ background:#7e57c2; top:26px; height:6px; opacity:0.5; margin-top:0; }
  .gantt-legend{ font-size:11px; color:var(--ink-soft); display:flex; gap:16px; margin-bottom:12px; }
  .legend-dot{ display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:4px; vertical-align:middle; }

  /* Analytics */
  .grid-3{ display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:14px; }
  .stat-card{ padding:16px; }
  .stat-card .num{ font-size:26px; font-weight:700; }
  .stat-card .label{ font-size:12px; color:var(--ink-soft); }
  .heat-row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; }
  .heat-bar{ height:14px; border-radius:7px; background: var(--accent); }
  .heat-label{ width:140px; }

  /* Directory */
  table.directory{ width:100%; border-collapse:collapse; font-size:13px; }
  table.directory th, table.directory td{ text-align:left; padding:10px; border-bottom:1px solid rgba(0,0,0,0.06); }
  .role-pill{ font-size:11px; padding:2px 8px; border-radius:12px; background:rgba(61,108,255,0.12); color:var(--accent); }

  .panel{ padding:18px; margin-bottom:14px; }
  .panel h3{ margin-top:0; }

  @media (max-width: 640px){
    .kanban{ grid-template-columns: 1fr; }
    header.topbar{ flex-direction:column; gap:10px; align-items:flex-start; }
  }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-screen">
  <div class="card glass">
    <h1>Stratega <span>PM</span></h1>
    <p>Enter your name and PIN to continue</p>
    <input id="login-name" type="text" placeholder="Your name" list="login-user-list" autocomplete="off" />
    <datalist id="login-user-list"></datalist>
    <input id="login-pin" type="password" maxlength="4" placeholder="• • • •" />
    <button class="primary" onclick="handleLogin()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <header class="topbar glass">
    <div class="brand">Stratega <span>PM</span></div>
    <nav class="tabs" id="tabs">
      <button data-view="kanban" class="active">Kanban</button>
      <button data-view="gantt">Gantt</button>
      <button data-view="analytics">Analytics</button>
      <button data-view="directory">Team</button>
      <button data-view="mobile">Overview</button>
      <button data-view="manage" id="tab-manage" style="display:none;">Manage</button>
    </nav>
    <div class="who">
      <label style="font-size:12px; color:var(--ink-soft);">Project:</label>
      <select id="project-filter" style="padding:6px 8px; border-radius:8px; border:1px solid rgba(0,0,0,0.15); font-size:12px;"></select>
      <span id="whoami"></span>
      <button onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- KANBAN -->
    <section class="view active" id="view-kanban">
      <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
        <button class="primary" style="width:auto;" onclick="openTaskModal()">+ New task</button>
      </div>
      <div class="kanban" id="kanban-board"></div>
    </section>

    <!-- GANTT -->
    <section class="view" id="view-gantt">
      <div class="gantt-wrap glass">
        <div class="gantt-legend">
          <span><span class="legend-dot" style="background:var(--accent-soft)"></span>Planned</span>
          <span><span class="legend-dot" style="background:var(--ok)"></span>Actual</span>
          <span><span class="legend-dot" style="background:#b39ddb"></span>Baseline 1</span>
          <span><span class="legend-dot" style="background:#7e57c2"></span>Baseline 2</span>
        </div>
        <div id="gantt-rows"></div>
      </div>
    </section>

    <!-- ANALYTICS -->
    <section class="view" id="view-analytics">
      <div class="grid-3" style="margin-bottom:14px;" id="stat-cards"></div>
      <div class="panel glass">
        <h3>Department workload heatmap</h3>
        <div id="heatmap"></div>
      </div>
      <div class="panel glass">
        <h3>At-risk resources (5+ open tasks)</h3>
        <div id="at-risk"></div>
      </div>
      <div class="panel glass">
        <h3>Bottleneck: avg time-in-status (days)</h3>
        <div id="bottleneck"></div>
      </div>
    </section>

    <!-- DIRECTORY -->
    <section class="view" id="view-directory">
      <div class="panel glass">
        <h3>Team directory</h3>
        <table class="directory" id="directory-table"></table>
      </div>
    </section>

    <!-- MOBILE / OVERVIEW -->
    <section class="view" id="view-mobile">
      <div class="grid-3" id="mobile-cards"></div>
    </section>

    <!-- MANAGE (Admin / Manager only) -->
    <section class="view" id="view-manage">
      <div class="panel glass" id="manage-add-project-panel">
        <h3>Add project</h3>
        <div class="row2">
          <div><label>Project name</label><input id="new-project-name" /></div>
        </div>
        <button class="primary" style="width:auto; margin-top:10px;" onclick="addProject()">Add project</button>
      </div>

      <div class="panel glass">
        <h3>Add department</h3>
        <div class="row2">
          <div><label>Department name</label><input id="new-department-name" /></div>
          <div><label>Parent department (optional)</label><select id="new-department-parent"></select></div>
        </div>
        <button class="primary" style="width:auto; margin-top:10px;" onclick="addDepartment()">Add department</button>
      </div>

      <div class="panel glass">
        <h3>Add team member</h3>
        <div class="row2">
          <div><label>Name</label><input id="new-user-name" /></div>
          <div><label>Role</label>
            <select id="new-user-role">
              <option>User</option><option>Manager</option><option>Admin</option>
            </select>
          </div>
        </div>
        <div class="row2">
          <div><label>Project</label><select id="new-user-project"></select></div>
          <div><label>Department</label><select id="new-user-department"></select></div>
        </div>
        <div class="row2">
          <div><label>PIN (4 digits)</label><input id="new-user-pin" maxlength="4" placeholder="1234" /></div>
          <div></div>
        </div>
        <button class="primary" style="width:auto; margin-top:10px;" onclick="addUser()">Add team member</button>
      </div>
    </section>
  </main>
</div>

<!-- ===================== TASK MODAL ===================== -->
<div class="modal-backdrop" id="task-modal-backdrop">
  <div class="modal glass">
    <h2 id="modal-title">New task</h2>
    <input type="hidden" id="task-id" />
    <label>Title</label>
    <input id="task-title" />
    <label>Description</label>
    <textarea id="task-description"></textarea>
    <div class="row2">
      <div><label>Project</label><select id="task-project"></select></div>
      <div><label>Department</label><select id="task-department"></select></div>
    </div>
    <div class="row2">
      <div><label>Assignee</label><select id="task-assignee"></select></div>
      <div></div>
    </div>
    <div class="row2">
      <div><label>Status</label><select id="task-status"></select></div>
      <div><label>Priority</label><select id="task-priority"></select></div>
    </div>
    <div class="row2">
      <div><label>Planned start</label><input type="date" id="task-planned-start" /></div>
      <div><label>Planned finish</label><input type="date" id="task-planned-finish" /></div>
    </div>
    <div class="row2">
      <div><label>Baseline 1 (start / finish)</label><input type="date" id="task-b1-start" /></div>
      <div><label>&nbsp;</label><input type="date" id="task-b1-finish" /></div>
    </div>
    <div class="row2">
      <div><label>Baseline 2 (start / finish)</label><input type="date" id="task-b2-start" /></div>
      <div><label>&nbsp;</label><input type="date" id="task-b2-finish" /></div>
    </div>

    <div class="comments-box" id="audit-box" style="display:none;">
      <h3 style="font-size:13px; margin:0 0 6px;">Audit trail</h3>
      <div id="audit-list" style="max-height:140px; overflow:auto;"></div>
    </div>

    <div class="comments-box" id="comments-box" style="display:none;">
      <h3 style="font-size:13px; margin:0 0 6px;">Comments</h3>
      <div id="comments-list"></div>
      <textarea id="comment-input" placeholder="Add a comment..."></textarea>
      <button class="primary" style="margin-top:6px;" onclick="addComment()">Post comment</button>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete-task" style="display:none;" onclick="deleteTask()">Delete</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — replace with your Supabase project details
   ============================================================ */
const SUPABASE_URL = "https://mjdhvwykoanuvcxfzext.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_WlU80fWZU8rEDKlewo5FyQ_vIZh74bq";

const supabaseLibLoaded = typeof window.supabase !== "undefined" && typeof window.supabase.createClient === "function";
const placeholdersReplaced = !SUPABASE_URL.includes("YOUR-PROJECT") && !SUPABASE_ANON_KEY.includes("YOUR-ANON-KEY");

let supabaseClient = null;
let supabaseInitError = "";

if (!supabaseLibLoaded) {
  supabaseInitError = "The Supabase library didn't load (check network/ad-blocker, or your internet connection).";
} else if (!placeholdersReplaced) {
  supabaseInitError = "Replace SUPABASE_URL and SUPABASE_ANON_KEY at the top of the script with your real project values.";
} else {
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    supabaseInitError = "Supabase client failed to initialize: " + e.message;
  }
}
if (supabaseInitError) console.warn(supabaseInitError);

/* ============================================================
   LOCAL STATE + CACHE (fallback only — Supabase is source of truth)
   ============================================================ */
const CACHE_KEY = "stratega_pm_cache_v1";
let state = {
  currentUser: null,
  currentProjectFilter: "all", // "all" (cross-project) or a specific project_id
  users: [],
  departments: [],
  projects: [],
  statuses: [],
  priorities: [],
  tasks: [],
  comments: [],       // { id, task_id, author_id, body, created_at }
  automationRules: [],
  userDepartments: [], // { user_id, department_id }
};

function saveCache(){
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(state)); } catch(e){ console.warn("cache save failed", e); }
}
function loadCache(){
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch(e){ console.warn("cache load failed", e); }
}

/* ============================================================
   AUTOMATION ENGINE
   Applies automation_rules to a task payload before saving.
   Supports boolean casts and TODAY±N relative date syntax.
   ============================================================ */
function evaluateAutomationRules(updatedTask, rules){
  let processedPayload = { ...updatedTask };
  rules.forEach((rule) => {
    const currentValue = String(processedPayload[rule.source_field] ?? "");
    if (currentValue === String(rule.trigger_value)) {
      const field = rule.target_field;
      const val = String(rule.target_value).trim();
      if (field === "complete") {
        processedPayload.complete = val.toLowerCase() === "true";
      } else if (val.toUpperCase().startsWith("TODAY")) {
        const computedDate = new Date();
        const match = val.match(/TODAY\s*([+-])\s*(\d+)/i);
        if (match) {
          const operator = match[1];
          const amount = parseInt(match[2], 10);
          if (operator === "+") computedDate.setDate(computedDate.getDate() + amount);
          if (operator === "-") computedDate.setDate(computedDate.getDate() - amount);
        }
        processedPayload[field] = computedDate.toISOString().split("T")[0];
      } else {
        processedPayload[field] = val;
      }
    }
  });
  return processedPayload;
}

/* ============================================================
   AUTH — custom PIN-based (not Supabase Auth)
   ============================================================ */
async function fetchAllReferenceData(){
  if (!supabaseClient){
    console.warn("Supabase client not configured — check SUPABASE_URL / SUPABASE_ANON_KEY.");
    return;
  }
  try {
    const [u, d, p, s, pr, t, c, ar, ud] = await Promise.all([
      supabaseClient.from("users").select("*"),
      supabaseClient.from("departments").select("*"),
      supabaseClient.from("projects").select("*"),
      supabaseClient.from("statuses").select("*").order("sort_order"),
      supabaseClient.from("priorities").select("*").order("sort_order"),
      supabaseClient.from("tasks").select("*"),
      supabaseClient.from("task_comments").select("*"),
      supabaseClient.from("automation_rules").select("*"),
      supabaseClient.from("user_departments").select("*"),
    ]);
    [u, d, p, s, pr, t, c, ar, ud].forEach(res => { if (res.error) console.error("Fetch error:", res.error); });
    state.users = u.data || state.users;
    state.departments = d.data || state.departments;
    state.projects = p.data || state.projects;
    state.statuses = s.data || state.statuses;
    state.priorities = pr.data || state.priorities;
    state.tasks = t.data || state.tasks;
    state.comments = c.data || state.comments;
    state.automationRules = ar.data || state.automationRules;
    state.userDepartments = ud.data || state.userDepartments;
    saveCache();
  } catch(e){
    console.error("fetchAllReferenceData failed, falling back to cached data:", e);
  }
}

function populateLoginDropdown(){
  const list = document.getElementById("login-user-list");
  list.innerHTML = state.users.map(u => `<option value="${u.name}">${u.role}</option>`).join("");
}

async function handleLogin(){
  const typedName = document.getElementById("login-name").value.trim();
  const pin = document.getElementById("login-pin").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";

  if (!supabaseClient){
    errEl.textContent = supabaseInitError || "Supabase is not configured yet.";
    return;
  }
  if (!typedName){
    errEl.textContent = "Enter your name.";
    return;
  }
  const matchedUser = state.users.find(u => u.name.toLowerCase() === typedName.toLowerCase());
  if (!matchedUser){
    errEl.textContent = "No user found with that name.";
    return;
  }
  const userId = matchedUser.id;
  try {
    const { data, error } = await supabaseClient.rpc("verify_user_pin", {
      target_user_id: userId,
      entered_pin: pin
    });
    if (error) throw error;
    if (!data){
      errEl.textContent = "Incorrect PIN. Try again.";
      return;
    }
    state.currentUser = state.users.find(u => u.id === userId);
    saveCache();
    enterApp();
  } catch(e){
    console.error(e);
    errEl.textContent = "Sign-in failed. Check your connection.";
  }
}

function logout(){
  state.currentUser = null;
  saveCache();
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-pin").value = "";
  document.getElementById("login-name").value = "";
}

function isAdmin(){ return state.currentUser?.role === "Admin"; }
function isManagerOrAdmin(){
  const r = state.currentUser?.role;
  return r === "Admin" || r === "Manager";
}
function myDepartmentIds(){
  const uid = state.currentUser?.id;
  return state.userDepartments.filter(ud => ud.user_id === uid).map(ud => ud.department_id);
}
function canEditTask(task){
  const u = state.currentUser;
  if (!u) return false;
  if (u.role === "Admin") return true;
  if (u.role === "Manager"){
    const depts = myDepartmentIds();
    return depts.length === 0 ? true : depts.includes(task.department_id);
  }
  // regular User: can edit only their own department's tasks
  const depts = myDepartmentIds();
  return depts.includes(task.department_id);
}

function visibleTasks(){
  if (isManagerOrAdmin() && state.currentProjectFilter === "all") return state.tasks;
  const projectId = state.currentProjectFilter === "all"
    ? state.currentUser?.project_id
    : Number(state.currentProjectFilter);
  return state.tasks.filter(t => t.project_id === projectId);
}

function populateProjectFilter(){
  const sel = document.getElementById("project-filter");
  if (isManagerOrAdmin()){
    sel.innerHTML = `<option value="all">All projects (cross-project)</option>` +
      state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
    sel.disabled = false;
  } else {
    // regular Users are locked to their own project
    const own = state.projects.find(p => p.id === state.currentUser?.project_id);
    sel.innerHTML = `<option value="${state.currentUser?.project_id}">${own ? own.name : "My project"}</option>`;
    sel.disabled = true;
    state.currentProjectFilter = state.currentUser?.project_id;
  }
}

document.getElementById("project-filter")?.addEventListener?.("change", (e) => {
  state.currentProjectFilter = e.target.value === "all" ? "all" : Number(e.target.value);
  renderAll();
});

function enterApp(){
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("whoami").textContent =
    `${state.currentUser.name} — ${state.currentUser.role}`;
  document.getElementById("tab-manage").style.display = isManagerOrAdmin() ? "inline-block" : "none";
  populateProjectFilter();
  renderAll();
}

/* ============================================================
   SPA ROUTER — defensive isolation: only one view visible ever
   ============================================================ */
document.getElementById("tabs").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-view]");
  if (!btn) return;
  navigateTo(btn.dataset.view);
});

function navigateTo(viewName){
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b.dataset.view === viewName));
  document.querySelectorAll("main .view").forEach(v => v.classList.remove("active"));
  const target = document.getElementById(`view-${viewName}`);
  if (target) target.classList.add("active");
  if (viewName === "gantt") renderGantt();
  if (viewName === "analytics") renderAnalytics();
  if (viewName === "directory") renderDirectory();
  if (viewName === "mobile") renderMobile();
  if (viewName === "manage") renderManage();
}

/* ============================================================
   MANAGE — Admin/Manager: add projects, departments, team members
   ============================================================ */
function renderManage(){
  if (!isManagerOrAdmin()){
    document.getElementById("view-manage").innerHTML = `<p style="color:var(--ink-soft)">You don't have access to this section.</p>`;
    return;
  }

  document.getElementById("manage-add-project-panel").style.display = isAdmin() ? "block" : "none";

  const parentSel = document.getElementById("new-department-parent");
  parentSel.innerHTML = `<option value="">None</option>` +
    state.departments.map(d => `<option value="${d.id}">${d.name}</option>`).join("");

  const userProjSel = document.getElementById("new-user-project");
  const userDeptSel = document.getElementById("new-user-department");

  if (isAdmin()){
    // Admins: unrestricted, can add users/departments/projects anywhere
    userProjSel.innerHTML = state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
    userProjSel.disabled = false;
    userDeptSel.innerHTML = state.departments.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    userDeptSel.disabled = false;
  } else {
    // Managers: locked to their own project; can pick among their own departments
    const ownProject = state.projects.find(p => p.id === state.currentUser.project_id);
    userProjSel.innerHTML = `<option value="${state.currentUser.project_id}">${ownProject ? ownProject.name : "My project"}</option>`;
    userProjSel.disabled = true;

    const myDepts = myDepartmentIds();
    const scopedDepts = myDepts.length ? state.departments.filter(d => myDepts.includes(d.id)) : state.departments;
    userDeptSel.innerHTML = scopedDepts.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    userDeptSel.disabled = false;
  }
}

async function addProject(){
  if (!isAdmin()){ alert("Only Admins can add projects."); return; }
  const name = document.getElementById("new-project-name").value.trim();
  if (!name){ alert("Enter a project name."); return; }
  if (!supabaseClient){ alert("Supabase isn't configured."); return; }
  const { data, error } = await supabaseClient.from("projects").insert({ name }).select().single();
  if (error){ alert("Couldn't add project: " + error.message); return; }
  state.projects.push(data);
  saveCache();
  populateProjectFilter();
  renderManage();
  document.getElementById("new-project-name").value = "";
  alert(`Project "${name}" added.`);
}

async function addDepartment(){
  const name = document.getElementById("new-department-name").value.trim();
  const parentVal = document.getElementById("new-department-parent").value;
  if (!name){ alert("Enter a department name."); return; }
  if (!supabaseClient){ alert("Supabase isn't configured."); return; }
  const { data, error } = await supabaseClient.from("departments").insert({
    name, parent_department_id: parentVal ? Number(parentVal) : null
  }).select().single();
  if (error){ alert("Couldn't add department: " + error.message); return; }
  state.departments.push(data);
  saveCache();
  renderManage();
  document.getElementById("new-department-name").value = "";
  alert(`Department "${name}" added.`);
}

async function addUser(){
  const name = document.getElementById("new-user-name").value.trim();
  const role = document.getElementById("new-user-role").value;
  const projectId = Number(document.getElementById("new-user-project").value);
  const departmentId = Number(document.getElementById("new-user-department").value);
  const pin = document.getElementById("new-user-pin").value.trim();

  if (!name || !/^\d{4}$/.test(pin)){ alert("Enter a name and a 4-digit PIN."); return; }
  if (!supabaseClient){ alert("Supabase isn't configured."); return; }

  const { data: newUserId, error } = await supabaseClient.rpc("create_user_with_pin", {
    p_name: name, p_role: role, p_project_id: projectId, p_pin: pin
  });
  if (error){ alert("Couldn't add team member: " + error.message); return; }

  await supabaseClient.from("user_departments").insert({ user_id: newUserId, department_id: departmentId });

  state.users.push({ id: newUserId, name, role, project_id: projectId, pin_hash: "" });
  saveCache();
  renderManage();
  renderDirectory();
  document.getElementById("new-user-name").value = "";
  document.getElementById("new-user-pin").value = "";
  alert(`Team member "${name}" added with PIN ${pin}.`);
}

/* ============================================================
   KANBAN
   ============================================================ */
function renderAll(){
  renderKanban();
  renderGantt();
  renderAnalytics();
  renderDirectory();
  renderMobile();
}

function statusName(id){ return state.statuses.find(s => s.id === id)?.name || "—"; }
function priorityName(id){ return state.priorities.find(p => p.id === id)?.name || "—"; }
function userName(id){ return state.users.find(u => u.id === id)?.name || "Unassigned"; }
function departmentName(id){ return state.departments.find(d => d.id === id)?.name || "—"; }
function commentsForTask(taskId){ return state.comments.filter(c => c.task_id === taskId); }

function renderKanban(){
  const board = document.getElementById("kanban-board");
  board.innerHTML = "";
  state.statuses.forEach(status => {
    const col = document.createElement("div");
    col.className = "kanban-col glass";
    col.dataset.statusId = status.id;
    const tasksInCol = visibleTasks().filter(t => t.status_id === status.id);
    col.innerHTML = `<h3>${status.name} <span class="count">${tasksInCol.length}</span></h3>`;
    tasksInCol.forEach(t => col.appendChild(renderTaskCard(t)));

    col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("dragover"); });
    col.addEventListener("dragleave", () => col.classList.remove("dragover"));
    col.addEventListener("drop", async e => {
      e.preventDefault();
      col.classList.remove("dragover");
      const taskId = Number(e.dataTransfer.getData("text/task-id"));
      await moveTaskToStatus(taskId, status.id);
    });
    board.appendChild(col);
  });
}

function renderTaskCard(t){
  const card = document.createElement("div");
  const pName = priorityName(t.priority_id);
  card.className = `task-card priority-${pName}`;
  card.draggable = true;
  card.addEventListener("dragstart", e => e.dataTransfer.setData("text/task-id", t.id));
  card.addEventListener("click", () => openTaskModal(t.id));
  const cCount = commentsForTask(t.id).length;
  card.innerHTML = `
    <h4>${t.title}</h4>
    <div class="meta"><span>${userName(t.assigned_to)}</span><span>${pName}</span></div>
    ${cCount ? `<div class="comment-count">${cCount} comment${cCount > 1 ? "s" : ""}</div>` : ""}
  `;
  return card;
}

async function moveTaskToStatus(taskId, newStatusId){
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!canEditTask(task)){ alert("You don't have edit rights for this task's department."); return; }

  let payload = { ...task, status_id: newStatusId };
  payload = evaluateAutomationRules(payload, state.automationRules);

  // optimistic local update
  Object.assign(task, payload);
  renderKanban();
  saveCache();

  if (supabaseClient){
    const { error } = await supabaseClient.from("tasks").update({
      status_id: payload.status_id,
      complete: payload.complete,
      actual_start: payload.actual_start,
      actual_finish: payload.actual_finish,
    }).eq("id", taskId);
    if (error) console.error("sync failed, kept local optimistic state:", error);
  }
}

/* ============================================================
   TASK MODAL — create / edit / comments
   ============================================================ */
function openTaskModal(taskId){
  const isEdit = !!taskId;
  const task = isEdit ? state.tasks.find(t => t.id === taskId) : null;

  document.getElementById("modal-title").textContent = isEdit ? "Edit task" : "New task";
  document.getElementById("task-id").value = taskId || "";
  document.getElementById("task-title").value = task?.title || "";
  document.getElementById("task-description").value = task?.description || "";

  const projSel = document.getElementById("task-project");
  projSel.innerHTML = state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  projSel.value = task?.project_id
    || (state.currentProjectFilter !== "all" ? state.currentProjectFilter : state.currentUser?.project_id)
    || state.projects[0]?.id;

  const deptSel = document.getElementById("task-department");
  deptSel.innerHTML = state.departments.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
  deptSel.value = task?.department_id || state.departments[0]?.id;

  const asgSel = document.getElementById("task-assignee");
  asgSel.innerHTML = state.users.map(u => `<option value="${u.id}">${u.name}</option>`).join("");
  asgSel.value = task?.assigned_to || state.users[0]?.id;

  const statusSel = document.getElementById("task-status");
  statusSel.innerHTML = state.statuses.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
  statusSel.value = task?.status_id || state.statuses[0]?.id;

  const prioSel = document.getElementById("task-priority");
  prioSel.innerHTML = state.priorities.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  prioSel.value = task?.priority_id || state.priorities[0]?.id;

  document.getElementById("task-planned-start").value = task?.planned_start || "";
  document.getElementById("task-planned-finish").value = task?.planned_finish || "";
  document.getElementById("task-b1-start").value = task?.baseline_1_start || "";
  document.getElementById("task-b1-finish").value = task?.baseline_1_finish || "";
  document.getElementById("task-b2-start").value = task?.baseline_2_start || "";
  document.getElementById("task-b2-finish").value = task?.baseline_2_finish || "";

  document.getElementById("btn-delete-task").style.display = isEdit ? "inline-block" : "none";
  document.getElementById("comments-box").style.display = isEdit ? "block" : "none";
  document.getElementById("audit-box").style.display = isEdit ? "block" : "none";
  if (isEdit){
    renderComments(taskId);
    loadAuditTrail(taskId);
  }

  document.getElementById("task-modal-backdrop").classList.add("active");
}

function closeTaskModal(){
  document.getElementById("task-modal-backdrop").classList.remove("active");
}

function renderComments(taskId){
  const list = document.getElementById("comments-list");
  const items = commentsForTask(taskId);
  list.innerHTML = items.length
    ? items.map(c => `<div class="comment"><b>${userName(c.author_id)}:</b> ${c.body}</div>`).join("")
    : `<div class="comment" style="color:var(--ink-soft)">No comments yet.</div>`;
}

async function addComment(){
  const taskId = Number(document.getElementById("task-id").value);
  const body = document.getElementById("comment-input").value.trim();
  if (!body || !taskId) return;

  const localComment = {
    id: Date.now(),
    task_id: taskId,
    author_id: state.currentUser.id,
    body,
    created_at: new Date().toISOString(),
  };
  state.comments.push(localComment);
  document.getElementById("comment-input").value = "";
  renderComments(taskId);
  renderKanban();
  saveCache();

  if (supabaseClient){
    const { error } = await supabaseClient.from("task_comments").insert({
      task_id: taskId, author_id: state.currentUser.id, body
    });
    if (error) console.error("comment sync failed:", error);
  }
}

async function loadAuditTrail(taskId){
  const list = document.getElementById("audit-list");
  list.innerHTML = `<div class="comment" style="color:var(--ink-soft)">Loading...</div>`;
  if (!supabaseClient){
    list.innerHTML = `<div class="comment" style="color:var(--ink-soft)">Not available offline.</div>`;
    return;
  }
  const { data, error } = await supabaseClient
    .from("audit_logs")
    .select("*")
    .eq("table_name", "tasks")
    .eq("record_id", taskId)
    .order("changed_at", { ascending: false })
    .limit(20);
  if (error){
    list.innerHTML = `<div class="comment" style="color:var(--danger)">Couldn't load audit trail.</div>`;
    return;
  }
  list.innerHTML = (data && data.length)
    ? data.map(entry => `<div class="comment"><b>${entry.action}</b> — ${new Date(entry.changed_at).toLocaleString()}</div>`).join("")
    : `<div class="comment" style="color:var(--ink-soft)">No history yet.</div>`;
}

async function saveTask(){
  const idVal = document.getElementById("task-id").value;
  const isEdit = !!idVal;

  const payload = {
    title: document.getElementById("task-title").value.trim(),
    description: document.getElementById("task-description").value,
    project_id: Number(document.getElementById("task-project").value),
    department_id: Number(document.getElementById("task-department").value),
    assigned_to: Number(document.getElementById("task-assignee").value),
    status_id: Number(document.getElementById("task-status").value),
    priority_id: Number(document.getElementById("task-priority").value),
    planned_start: document.getElementById("task-planned-start").value || null,
    planned_finish: document.getElementById("task-planned-finish").value || null,
    baseline_1_start: document.getElementById("task-b1-start").value || null,
    baseline_1_finish: document.getElementById("task-b1-finish").value || null,
    baseline_2_start: document.getElementById("task-b2-start").value || null,
    baseline_2_finish: document.getElementById("task-b2-finish").value || null,
  };

  if (!payload.title){ alert("Title is required."); return; }

  const processed = evaluateAutomationRules(payload, state.automationRules);

  if (isEdit){
    const id = Number(idVal);
    const existing = state.tasks.find(t => t.id === id);
    if (!canEditTask(existing)){ alert("You don't have edit rights for this task's department."); return; }
    Object.assign(existing, processed);
    renderAll();
    saveCache();
    if (supabaseClient){
      const { error } = await supabaseClient.from("tasks").update(processed).eq("id", id);
      if (error) console.error("update sync failed:", error);
    }
  } else {
    const localId = Date.now();
    const newTask = { id: localId, ...processed, complete: !!processed.complete };
    state.tasks.push(newTask);
    renderAll();
    saveCache();
    if (supabaseClient){
      const { data, error } = await supabaseClient.from("tasks").insert(processed).select().single();
      if (!error && data){
        // reconcile local temp id with real DB id
        const idx = state.tasks.findIndex(t => t.id === localId);
        if (idx > -1) state.tasks[idx] = data;
        renderAll();
        saveCache();
      } else if (error){
        console.error("insert sync failed, kept local copy:", error);
      }
    }
  }
  closeTaskModal();
}

async function deleteTask(){
  const id = Number(document.getElementById("task-id").value);
  if (!confirm("Delete this task?")) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  state.comments = state.comments.filter(c => c.task_id !== id);
  renderAll();
  saveCache();
  closeTaskModal();
  if (supabaseClient){
    const { error } = await supabaseClient.from("tasks").delete().eq("id", id);
    if (error) console.error("delete sync failed:", error);
  }
}

/* ============================================================
   GANTT — planned vs actual vs dual baseline
   ============================================================ */
function renderGantt(){
  const container = document.getElementById("gantt-rows");
  container.innerHTML = "";
  const tasks = visibleTasks();
  if (!tasks.length){
    container.innerHTML = `<p style="color:var(--ink-soft)">No tasks yet.</p>`;
    return;
  }
  const allDates = [];
  tasks.forEach(t => {
    [t.planned_start, t.planned_finish, t.actual_start, t.actual_finish,
     t.baseline_1_start, t.baseline_1_finish, t.baseline_2_start, t.baseline_2_finish]
      .forEach(d => { if (d) allDates.push(new Date(d)); });
  });
  if (!allDates.length){
    container.innerHTML = `<p style="color:var(--ink-soft)">No scheduled dates yet.</p>`;
    return;
  }
  const minDate = new Date(Math.min(...allDates));
  const maxDate = new Date(Math.max(...allDates));
  const totalDays = Math.max(1, (maxDate - minDate) / 86400000);

  function pct(dateStr){
    if (!dateStr) return null;
    const d = new Date(dateStr);
    return ((d - minDate) / 86400000 / totalDays) * 100;
  }
  function widthPct(startStr, endStr){
    const s = pct(startStr), e = pct(endStr);
    if (s === null || e === null) return null;
    return Math.max(1, e - s);
  }

  tasks.forEach(t => {
    const row = document.createElement("div");
    row.className = "gantt-row";
    const track = document.createElement("div");
    track.className = "gantt-track";

    const bars = [
      { cls: "planned", s: t.planned_start, e: t.planned_finish },
      { cls: "actual", s: t.actual_start, e: t.actual_finish },
      { cls: "baseline1", s: t.baseline_1_start, e: t.baseline_1_finish },
      { cls: "baseline2", s: t.baseline_2_start, e: t.baseline_2_finish },
    ];
    bars.forEach(b => {
      const left = pct(b.s);
      const w = widthPct(b.s, b.e);
      if (left === null || w === null) return;
      const bar = document.createElement("div");
      bar.className = `bar ${b.cls}`;
      bar.style.left = `${left}%`;
      bar.style.width = `${w}%`;
      bar.title = `${b.cls}: ${b.s} → ${b.e}`;
      track.appendChild(bar);
    });

    row.innerHTML = `<div class="gantt-label">${t.title}</div>`;
    row.appendChild(track);
    container.appendChild(row);
  });
}

/* ============================================================
   ANALYTICS
   ============================================================ */
function renderAnalytics(){
  const tasks = visibleTasks();
  const total = tasks.length;
  const done = tasks.filter(t => t.complete).length;
  const open = total - done;
  const overdue = tasks.filter(t => t.planned_finish && !t.complete && new Date(t.planned_finish) < new Date()).length;

  document.getElementById("stat-cards").innerHTML = `
    <div class="stat-card glass"><div class="num">${total}</div><div class="label">Total tasks</div></div>
    <div class="stat-card glass"><div class="num">${open}</div><div class="label">Open</div></div>
    <div class="stat-card glass"><div class="num">${done}</div><div class="label">Completed</div></div>
    <div class="stat-card glass"><div class="num">${overdue}</div><div class="label">Overdue</div></div>
  `;

  // heatmap by department
  const byDept = {};
  tasks.forEach(t => {
    const name = departmentName(t.department_id);
    byDept[name] = (byDept[name] || 0) + 1;
  });
  const maxCount = Math.max(1, ...Object.values(byDept));
  document.getElementById("heatmap").innerHTML = Object.entries(byDept).map(([name, count]) => `
    <div class="heat-row">
      <div class="heat-label">${name}</div>
      <div class="heat-bar" style="width:${(count / maxCount) * 100}%"></div>
      <span>${count}</span>
    </div>
  `).join("") || `<p style="color:var(--ink-soft)">No data yet.</p>`;

  // at-risk resources: 5+ open tasks
  const byUser = {};
  tasks.filter(t => !t.complete).forEach(t => {
    byUser[t.assigned_to] = (byUser[t.assigned_to] || 0) + 1;
  });
  const atRisk = Object.entries(byUser).filter(([, c]) => c >= 5);
  document.getElementById("at-risk").innerHTML = atRisk.length
    ? atRisk.map(([uid, c]) => `<div class="heat-row"><div class="heat-label">${userName(Number(uid))}</div><span>${c} open tasks</span></div>`).join("")
    : `<p style="color:var(--ink-soft)">No one is currently overloaded.</p>`;

  // bottleneck: avg days since creation for tasks still open, grouped by status
  const byStatus = {};
  tasks.filter(t => !t.complete).forEach(t => {
    const name = statusName(t.status_id);
    const days = t.created_at ? (Date.now() - new Date(t.created_at)) / 86400000 : 0;
    if (!byStatus[name]) byStatus[name] = [];
    byStatus[name].push(days);
  });
  document.getElementById("bottleneck").innerHTML = Object.entries(byStatus).map(([name, arr]) => {
    const avg = (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);
    return `<div class="heat-row"><div class="heat-label">${name}</div><span>${avg} days avg</span></div>`;
  }).join("") || `<p style="color:var(--ink-soft)">No data yet.</p>`;
}

/* ============================================================
   TEAM DIRECTORY

function renderDirectory(){
  const table = document.getElementById("directory-table");
